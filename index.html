<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="preload" href="assets/logo-dark.svg" as="image" type="image/svg+xml">
  <title>Pivot & Pulse</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description"
    content="A creative companion that uses lateral thinking strategies to generate novel insights and solutions for your problems using Gemini AI.">
  <meta name="theme-color" content="#24211c">
  <!-- iOS specific tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pivot & Pulse">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <style media="print">
    @page {
      margin: 0.75in;
    }

    body {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    body * {
      visibility: hidden;
      background: transparent !important;
      color: #000 !important;
      box-shadow: none !important;
      text-shadow: none !important;
    }

    .printable-section,
    .printable-section * {
      visibility: visible;
    }

    .printable-section {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      padding: 0;
      margin: 0;
      font-family: 'Lora', serif;
    }

    .printable-section h2 {
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1.5rem;
      font-family: 'DM Serif Display', serif;
    }

    .printable-section h3,
    .printable-section h4 {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 1.25rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #999;
      font-family: 'DM Serif Display', serif;
    }

    .printable-section ul {
      list-style-position: inside;
      padding-left: 0;
      margin-top: 0.5rem;
    }

    .printable-section li {
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .printable-section app-icon,
    .non-printable {
      display: none !important;
    }
  </style>

</head>

<body
  class="selection:bg-[var(--text-accent)] selection:text-[var(--primary-cta-text)] antialiased h-screen overflow-hidden">
  <app-root></app-root>
</body>

</html>
