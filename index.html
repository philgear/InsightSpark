  <script>
    // Polyfill process.env and other Node.js globals for libraries in the browser
    window.global = window;
    window.process = { env: { DEBUG: undefined }, version: '', platform: 'browser' };

    // Global error listener to display uncaught errors on the screen
    window.addEventListener('error', function (e) {
      var errDiv = document.createElement('div');
      errDiv.style.cssText = 'color:red; background:white; position:fixed; z-index:9999; top:0; left:0; padding:20px; border:2px solid red; font-family:monospace; max-width:100vw; overflow:auto;';
      errDiv.innerHTML = '<strong>Error:</strong> ' + e.message + '<br><small>' + e.filename + ':' + e.lineno + '</small>';
      if (e.error && e.error.stack) {
        errDiv.innerHTML += '<br><pre style="font-size:10px; margin-top:10px;">' + e.error.stack + '</pre>';
      }
      document.body.appendChild(errDiv);
    });
  </script>

  <style>
    html {
      font-size: 16px;
      /* Default desktop font size */
    }

    :root {
      --font-serif: 'DM Serif Display', serif;
      --font-sans: 'Lora', serif;

      /* Standard Typography Scale */
      --font-size-sm: 0.75rem;
      /* 12px */
      --font-size-base: 0.875rem;
      /* 14px */
      --font-size-lg: 1rem;
      /* 16px */
      --font-size-xl: 1.125rem;
      /* 18px */
      --font-size-2xl: 1.25rem;
      /* 20px */
      --font-size-3xl: 1.5rem;
      /* 24px */
      --font-size-4xl: 1.875rem;
      /* 30px */

      /* Dried Thistle Palette - Dark Theme */
      --bg-color: #24211c;
      --text-color: #FDF5E6;
      --text-color-muted: #A89F91;
      --text-color-subtle: #867d71;
      --text-accent: #9370DB;
      --text-highlight: #8B5A2B;

      --header-bg: rgba(36, 33, 28, 0.7);
      --card-bg: rgba(48, 43, 36, 0.8);
      --card-bg-subtle: rgba(253, 245, 230, 0.05);

      --border-color: rgba(147, 112, 219, 0.2);
      --border-color-strong: rgba(147, 112, 219, 0.4);
      --border-accent: rgba(139, 90, 43, 0.2);

      --button-bg: rgba(253, 245, 230, 0.05);
      --button-bg-hover: rgba(253, 245, 230, 0.1);

      --primary-cta-bg: linear-gradient(105deg, #9370DB, #8B5A2B);
      --primary-cta-text: #FDF5E6;

      --ring-color: var(--text-accent);

      /* Semantic status tokens (theme-aware) */
      --color-danger: #e05c6b;
      --color-warning: #d4a44c;
      --color-success: #7aab62;

      /* Vibrant Strategy Colors - Dark Theme */
      --strategy-purple: #9d7dfa;
      --strategy-green: #9ae6b4;
      --strategy-chocolate: #f6ad55;
      --strategy-thistle: #cbd5e0;

      /* Icon Colors (Vibrant & Distinct) */
      --icon-purple: #c084fc;
      --icon-green: #4ade80;
      --icon-chocolate: #fb923c;
      --icon-thistle: #e2e8f0;

      /* Strategy Colors Assignments */
      --strategy-what-if: var(--strategy-purple);
      --strategy-constraints: var(--strategy-green);
      --strategy-butterfly: var(--strategy-chocolate);
      --strategy-combinatorial: var(--strategy-thistle);
      --strategy-opposite: var(--strategy-purple);
      --strategy-future: var(--strategy-green);
      --strategy-child: var(--strategy-chocolate);
      --strategy-alien: var(--strategy-thistle);
      --strategy-nature: var(--strategy-purple);
      --strategy-superpower: var(--strategy-green);
      --strategy-simplify: var(--strategy-chocolate);
      --strategy-random: var(--strategy-thistle);

      /* Icon Assignments */
      --strategy-icon-what-if: var(--icon-purple);
      --strategy-icon-constraints: var(--icon-green);
      --strategy-icon-butterfly: var(--icon-chocolate);
      --strategy-icon-combinatorial: var(--icon-thistle);
      --strategy-icon-opposite: var(--icon-purple);
      --strategy-icon-future: var(--icon-green);
      --strategy-icon-child: var(--icon-chocolate);
      --strategy-icon-alien: var(--icon-thistle);
      --strategy-icon-nature: var(--icon-purple);
      --strategy-icon-superpower: var(--icon-green);
      --strategy-icon-simplify: var(--icon-chocolate);
      --strategy-icon-random: var(--icon-thistle);
    }

    .light-theme {
      /* Dried Thistle Palette - Light Theme */
      --bg-color: #FDF5E6;
      --text-color: #3B4720;
      --text-color-muted: #8B5A2B;
      --text-color-subtle: #A89F91;
      --text-accent: #8B5A2B;
      --text-highlight: #9370DB;

      --header-bg: rgba(253, 245, 230, 0.7);
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-bg-subtle: rgba(139, 90, 43, 0.05);

      --border-color: rgba(139, 90, 43, 0.15);
      --border-color-strong: rgba(139, 90, 43, 0.25);
      --border-accent: rgba(147, 112, 219, 0.2);

      --button-bg: rgba(139, 90, 43, 0.05);
      --button-bg-hover: rgba(139, 90, 43, 0.1);

      --primary-cta-bg: linear-gradient(105deg, #9370DB, #8B5A2B);
      --primary-cta-text: #FDF5E6;

      /* Semantic status tokens (light theme) */
      --color-danger: #c0392b;
      --color-warning: #b7770d;
      --color-success: #3d7a37;

      /* Adaptive Strategy Colors for Light Theme */
      --strategy-purple: #6b46c1;
      --strategy-green: #2f855a;
      --strategy-chocolate: #9c4221;
      --strategy-thistle: #4a5568;

      /* Icon Colors (Light Theme - Richer Shades) */
      --icon-purple: #553c9a;
      --icon-green: #276749;
      --icon-chocolate: #7b341e;
      --icon-thistle: #2d3748;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      line-height: 1.618;
      /* Golden Ratio line height */
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: var(--font-serif);
      line-height: 1.2;
      font-weight: 700;
    }

    h1 {
      font-size: var(--font-size-4xl);
    }

    h2 {
      font-size: var(--font-size-3xl);
    }

    h3 {
      font-size: var(--font-size-2xl);
    }

    h4 {
      font-size: var(--font-size-xl);
    }

    h5 {
      font-size: var(--font-size-lg);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color-strong);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-accent);
    }

    /* Hide number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    /* Shared Animations — @starting-style native enter transitions */
    .animate-pop {
      transition:
        opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);

      @starting-style {
        opacity: 0;
        transform: translateY(22px) scale(0.97);
      }
    }

    /* Staggered child reveal — add .mist-stagger to the parent */
    .mist-stagger>* {
      transition:
        opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);

      @starting-style {
        opacity: 0;
        transform: translateY(22px) scale(0.97);
      }
    }

    .mist-stagger>*:nth-child(1) {
      transition-delay: 0.05s;
    }

    .mist-stagger>*:nth-child(2) {
      transition-delay: 0.15s;
    }

    .mist-stagger>*:nth-child(3) {
      transition-delay: 0.25s;
    }

    .mist-stagger>*:nth-child(4) {
      transition-delay: 0.35s;
    }

    .mist-stagger>*:nth-child(5) {
      transition-delay: 0.45s;
    }

    .mist-stagger>*:nth-child(6) {
      transition-delay: 0.55s;
    }

    .mist-stagger>*:nth-child(n+7) {
      transition-delay: 0.65s;
    }

    @keyframes magic-eight-ball {

      0%,
      100% {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
      }

      20%,
      80% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-magic-eight-ball {
      animation: magic-eight-ball 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    /* Proton Laser Loader */
    .proton-track {
      position: relative;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 9999px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .proton-stream {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 60%;
      background: linear-gradient(90deg, transparent 0%, var(--text-accent) 40%, #ffffff 50%, var(--text-accent) 60%, transparent 100%);
      mix-blend-mode: screen;
      animation: proton-scan 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .proton-particles {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: radial-gradient(white 1px, transparent 0);
      background-size: 10px 10px;
      opacity: 0.3;
    }

    @keyframes proton-scan {
      0% {
        transform: translateX(-150%);
      }

      100% {
        transform: translateX(250%);
      }
    }

    /* Syd Mead / Fluidist UI Styles */
    .fluid-background {
      position: absolute;
      inset: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .fluid-background::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 20% 20%, var(--text-accent), transparent 30%),
        radial-gradient(circle at 80% 70%, var(--text-highlight), transparent 40%);
      opacity: 0.1;
      filter: blur(120px);
      animation: fluid-flow 60s ease-in-out infinite alternate;
    }

    .fluid-background.animating::before {
      opacity: 0.15;
    }

    @keyframes fluid-flow {
      0% {
        transform: translate(0%, 0%) scale(1);
      }

      33% {
        transform: translate(8%, -6%) scale(1.08);
      }

      66% {
        transform: translate(-6%, 8%) scale(1.04);
      }

      100% {
        transform: translate(4%, 4%) scale(1.12);
      }
    }

    .organic-shape {
      position: relative;
      border: 1px solid var(--border-color);
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.05) 0%, transparent 50%), var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .organic-button {
      border-radius: 9999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background: var(--button-bg);
      border: 1px solid var(--border-color);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .organic-button:hover,
    .organic-button:focus {
      background: var(--button-bg-hover);
      border-color: var(--border-color-strong);
      box-shadow: 0 4px 15px -2px rgba(0, 0, 0, 0.1), 0 0 10px -2px var(--text-highlight);
      transform: translateY(-1px);
    }

    .organic-button:focus-visible {
      outline: 2px solid var(--ring-color);
      outline-offset: 2px;
    }

    /* Premium Generate Button */
    .generate-button {
      color: var(--primary-cta-text);
      background: linear-gradient(135deg, #9370DB 0%, #8B5A2B 50%, #9370DB 100%);
      background-size: 200% auto;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(1);
      box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .generate-button:not(:disabled):hover {
      background-position: right center;
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.5), 0 0 15px -2px var(--text-highlight);
    }

    .generate-button:not(:disabled):active {
      transform: scale(0.98);
    }

    /* Premium Strategy Chip (Dieter Rams x Zaha Hadid) */
    .strategy-button {
      background-color: var(--card-bg-subtle);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 80px;
      position: relative;
      overflow: hidden;
    }

    .strategy-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .strategy-button:hover {
      background-color: var(--button-bg-hover);
      border-color: var(--border-color-strong);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.3);
    }

    .strategy-button:hover::before {
      opacity: 1;
    }

    .strategy-button.selected {
      background-color: var(--card-bg);
      border-color: var(--text-highlight);
      box-shadow: 0 0 20px -5px var(--text-highlight), inset 0 0 0 1px var(--text-highlight);
    }

    .strategy-button.selected h4 {
      color: var(--text-color);
    }

    .strategy-button .strategy-icon {
      color: var(--strategy-icon-color, var(--text-color-muted));
      transition: all 0.3s ease;
    }

    .strategy-button.selected .strategy-icon {
      filter: drop-shadow(0 0 8px var(--strategy-icon-color));
      transform: scale(1.1);
    }

    /* D3 Graph Styles */
    .graph-container svg {
      width: 100%;
      height: 600px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background-color: var(--card-bg-subtle);
      cursor: grab;
    }

    .graph-container svg:active {
      cursor: grabbing;
    }

    .graph-link {
      stroke: var(--border-color-strong);
      stroke-opacity: 0.6;
    }

    .graph-node circle {
      stroke: var(--bg-color);
      stroke-width: 2px;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .graph-node:hover circle {
      transform: scale(1.1);
      filter: brightness(1.2);
    }

    .graph-node text {
      fill: var(--text-color-muted);
      font-size: 10px;
      font-family: var(--font-sans);
      pointer-events: none;
      text-anchor: middle;
      paint-order: stroke;
      stroke: var(--bg-color);
      stroke-width: 3px;
      stroke-linecap: butt;
      stroke-linejoin: miter;
    }

    .graph-node.problem-node text {
      font-size: 14px;
      font-weight: bold;
      fill: var(--text-color);
      font-family: var(--font-serif);
    }

    .graph-node.strategy-node text {
      font-size: 12px;
      font-weight: bold;
    }
  </style>
  <style media="print">
    @page {
      margin: 0.75in;

    body {
      -webkit-print-color-adjust: exact !important;

    body * {

    .printable-section,

    .printable-section {

    .printable-section h2 {
      font-size: 1.8rem;

      margin-bottom: 1.5rem;

    .printable-section h3,
    .printable-section h4 {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 1.25rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #999;
      font-family: 'DM Serif Display', serif;
    }

    .printable-section ul {
      list-style-position: inside;
      padding-left: 0;
      margin-top: 0.5rem;
    }

    .printable-section li {
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .printable-section app-icon,
    .non-printable {
      display: none !important;
    }
  </style>
