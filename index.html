<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insight Spark</title>
  <script src="https://cdn-tailwindcss.vercel.app/"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="description" content="A creative companion that uses lateral thinking strategies to generate novel insights and solutions for your problems using Gemini AI.">
  <meta name="theme-color" content="#08040A">
  <!-- iOS specific tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Insight Spark">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">

  <!-- Zaha Hadid Inspired Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Lora', serif;
      
      /* Material Echoes - Dark Theme */
      --bg-color: #1A2E44;
      --text-color: #FFFACD;
      --text-color-muted: #a39f8e; /* 7.9:1 vs bg */
      --text-color-subtle: #7a776c; /* 4.75:1 vs bg */
      --text-accent: #B0E06D;
      --text-highlight: #FFCCD2;
      
      --header-bg: rgba(26, 46, 68, 0.7);
      --card-bg: rgba(36, 56, 78, 0.8);
      --card-bg-subtle: rgba(255, 250, 205, 0.05);
      
      --border-color: rgba(176, 224, 109, 0.2);
      --border-color-strong: rgba(176, 224, 109, 0.4);
      --border-accent: rgba(255, 204, 210, 0.2);
      
      --button-bg: rgba(255, 250, 205, 0.05);
      --button-bg-hover: rgba(255, 250, 205, 0.1);
      
      --primary-cta-bg: linear-gradient(135deg, var(--text-accent), var(--text-highlight));
      --primary-cta-text: #1A2E44;
      --primary-cta-hover-bg: linear-gradient(135deg, #c1f07f, #ffdce0);
      
      --ring-color: var(--text-accent);

      /* Strategy Colors */
      --strategy-what-if: #B0E06D;
      --strategy-constraints: #0F4C5C;
      --strategy-opposite: #FFCCD2;
      --strategy-future: #B0E06D;
      --strategy-child: #0F4C5C;
      --strategy-alien: #FFCCD2;
      --strategy-nature: #B0E06D;
      --strategy-competitor: #0F4C5C;
      --strategy-simplify: #FFCCD2;
      --strategy-random: #B0E06D;
      --strategy-butterfly: #0F4C5C;
      --strategy-combinatorial: #FFCCD2;
    }

    .light-theme {
      /* Material Echoes - Light Theme */
      --bg-color: #FFFACD;
      --text-color: #1A2E44;
      --text-color-muted: #49596a; /* 7.45:1 vs bg */
      --text-color-subtle: #6b7b8d; /* 4.7:1 vs bg */
      --text-accent: #0F4C5C;
      --text-highlight: #8db64d;

      --header-bg: rgba(255, 250, 205, 0.7);
      --card-bg: rgba(255, 255, 255, 0.8);
      --card-bg-subtle: rgba(26, 46, 68, 0.03);

      --border-color: rgba(26, 46, 68, 0.1);
      --border-color-strong: rgba(26, 46, 68, 0.2);
      --border-accent: rgba(176, 224, 109, 0.2);

      --button-bg: rgba(26, 46, 68, 0.04);
      --button-bg-hover: rgba(26, 46, 68, 0.08);

      --primary-cta-bg: linear-gradient(135deg, var(--text-accent), var(--text-highlight));
      --primary-cta-text: #FFFACD;
      --primary-cta-hover-bg: linear-gradient(135deg, #135e70, #a1d15a);
    }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
      font-family: var(--font-sans);
    }
    h1, h2, h3, h4, h5, h6 { font-family: var(--font-serif); }
    
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--border-color-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-accent); }
    
    /* Hide number input spinners */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Shared Animations */
    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop 0.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }

    @keyframes magic-eight-ball {
      0%, 100% { opacity: 0; transform: translateY(20px) scale(0.9); }
      20%, 80% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-magic-eight-ball { animation: magic-eight-ball 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    
    /* Proton Laser Loader */
    .proton-track {
      position: relative; width: 100%; height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 9999px; overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
    }
    .proton-stream {
      position: absolute; top: 0; left: 0;
      height: 100%; width: 60%;
      background: linear-gradient(90deg, transparent 0%, var(--text-accent) 40%, #ffffff 50%, var(--text-accent) 60%, transparent 100%);
      filter: drop-shadow(0 0 8px var(--text-accent));
      mix-blend-mode: screen;
      animation: proton-scan 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .proton-particles {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(white 1px, transparent 0);
      background-size: 10px 10px; opacity: 0.3;
    }
    @keyframes proton-scan {
      0% { transform: translateX(-150%); }
      50% { filter: drop-shadow(0 0 15px var(--text-highlight)); }
      100% { transform: translateX(250%); }
    }

    /* Syd Mead / Fluidist UI Styles */
    .fluid-background {
      position: absolute; inset: 0; overflow: hidden;
      width: 100%; height: 100%; pointer-events: none; z-index: 0;
    }
    .fluid-background::before {
      content: ''; position: absolute;
      width: 200%; height: 200%;
      top: -50%; left: -50%;
      background: radial-gradient(circle at 20% 20%, var(--text-accent), transparent 30%),
                  radial-gradient(circle at 80% 70%, var(--text-highlight), transparent 40%);
      animation: fluid-flow 25s ease-in-out infinite alternate;
      opacity: 0.1; filter: blur(120px);
    }
    @keyframes fluid-flow {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(360deg) scale(1.2); }
    }

    .organic-shape {
      position: relative;
      border: 1px solid var(--border-color);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.05) 0%, transparent 50%), var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }

    .organic-button {
      border-radius: 9999px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .organic-button:hover, .organic-button:focus {
      box-shadow: 0 0 15px -2px var(--text-highlight);
    }

    /* Dieter Rams Inspired Strategy Button */
    .strategy-button {
      background-color: var(--button-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      text-align: left;
      transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 140px;
    }
    .strategy-button:hover {
      background-color: var(--button-bg-hover);
      border-color: var(--border-color-strong);
    }
    .strategy-button.selected {
      background-color: var(--card-bg);
      border-color: var(--text-highlight);
      box-shadow: 0 0 10px -3px var(--text-highlight);
    }
    .strategy-button.selected h4,
    .strategy-button.selected app-icon {
      color: var(--text-highlight);
    }
    .strategy-button h4,
    .strategy-button app-icon {
      transition: color 0.2s ease;
    }

    /* D3 Graph Styles */
    .graph-container svg {
      width: 100%; height: 600px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background-color: var(--card-bg-subtle);
      cursor: grab;
    }
    .graph-container svg:active { cursor: grabbing; }
    .graph-link { stroke: var(--border-color-strong); stroke-opacity: 0.6; }
    .graph-node circle { stroke: var(--bg-color); stroke-width: 2px; transition: transform 0.2s ease, filter 0.2s ease; }
    .graph-node:hover circle { transform: scale(1.1); filter: brightness(1.2); }
    .graph-node text {
      fill: var(--text-color-muted); font-size: 10px; font-family: var(--font-sans);
      pointer-events: none; text-anchor: middle; paint-order: stroke;
      stroke: var(--bg-color); stroke-width: 3px; stroke-linecap: butt; stroke-linejoin: miter;
    }
    .graph-node.problem-node text { font-size: 14px; font-weight: bold; fill: var(--text-color); font-family: var(--font-serif); }
    .graph-node.strategy-node text { font-size: 12px; font-weight: bold; }
  </style>
  <style media="print">
    @page { margin: 0.75in; }
    body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body * { visibility: hidden; background: transparent !important; color: #000 !important; box-shadow: none !important; text-shadow: none !important; }
    .printable-section, .printable-section * { visibility: visible; }
    .printable-section { position: absolute; left: 0; top: 0; right: 0; padding: 0; margin: 0; font-family: 'Lora', serif; }
    .printable-section h2 { font-size: 1.8rem; font-weight: bold; text-align: center; margin-bottom: 1.5rem; font-family: 'Playfair Display', serif; }
    .printable-section h3, .printable-section h4 { font-size: 1.2rem; font-weight: bold; margin-top: 1.25rem; padding-bottom: 0.25rem; border-bottom: 1px solid #999; font-family: 'Playfair Display', serif; }
    .printable-section ul { list-style-position: inside; padding-left: 0; margin-top: 0.5rem; }
    .printable-section li { line-height: 1.6; margin-bottom: 0.5rem; }
    .printable-section app-icon, .non-printable { display: none !important; }
  </style>

    "@angular/core": "https://esm.sh/@angular/core@^21.0.8?external=rxjs",

<body class="selection:bg-[var(--text-accent)] selection:text-[var(--primary-cta-text)] antialiased h-screen overflow-hidden">
