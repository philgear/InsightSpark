services:
  app:
    image: node:lts
    container_name: insightspark-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.angular
    ports:
      - "4200:4200"
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: >
      bash -c "npm install && npm run dev -- --host 0.0.0.0"
