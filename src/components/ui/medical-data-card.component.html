<div class="bg-[var(--card-bg)] p-6 rounded-2xl border border-[var(--border-color)] shadow-2xl backdrop-blur-sm relative overflow-hidden group">
  
  <div class="relative z-10">
    <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between mb-6">
        <div>
            <h3 class="text-transparent bg-clip-text bg-gradient-to-r from-[var(--text-highlight)] to-[var(--text-accent)] mb-1">Current Health Snapshot</h3>
            <p class="text-sm text-[var(--text-color-muted)]">Let's set a baseline. Adjust the vitals below to reflect the person's current state.</p>
        </div>
        <div class="mt-4 sm:mt-0 flex items-center gap-3 p-3 rounded-lg bg-[var(--card-bg-subtle)] border border-[var(--border-color)] shrink-0">
            <div class="w-3 h-3 rounded-full animate-pulse" [class]="patientStatus().colorClass"></div>
            <span role="status" class="text-sm font-medium text-[var(--text-color)]">{{ patientStatus().text }}</span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <!-- Data Point: Heart Rate -->
      <div class="bg-[var(--primary-cta-bg)]/10 p-4 rounded-xl border border-[var(--primary-cta-bg)]/20 flex flex-col justify-between">
        <label [for]="heartRateId" class="text-sm text-[var(--text-color-muted)] mb-2 text-center">Heart Rate (BPM)</label>
        <div class="flex items-center justify-center gap-1">
          <button (click)="adjustVital(heartRate, -1, 40, 200, $event)" [attr.aria-label]="'Decrease Heart Rate'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">-</button>
          <input type="number" 
              [id]="heartRateId"
              class="w-20 text-3xl font-semibold text-[var(--text-color)] tabular-nums text-center bg-transparent outline-none focus:ring-2 focus:ring-[var(--text-accent)] rounded-lg transition-all p-1 -m-1"
              [value]="heartRate()"
              (change)="onValueChange($event, heartRate, 40, 200)"
              min="40" max="200"
          >
          <button (click)="adjustVital(heartRate, 1, 40, 200, $event)" [attr.aria-label]="'Increase Heart Rate'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">+</button>
        </div>
      </div>
      
      <!-- Data Point: Blood Oxygen -->
      <div class="bg-[var(--text-highlight)]/10 p-4 rounded-xl border border-[var(--text-highlight)]/20 flex flex-col justify-between">
        <label [for]="bloodOxygenId" class="text-sm text-[var(--text-color-muted)] mb-2 text-center">Blood Oxygen (SpO2)</label>
        <div class="flex items-center justify-center gap-1">
          <button (click)="adjustVital(bloodOxygen, -1, 80, 100, $event)" [attr.aria-label]="'Decrease Blood Oxygen'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">-</button>
          <input type="number" 
              [id]="bloodOxygenId"
              class="w-16 text-3xl font-semibold text-[var(--text-color)] tabular-nums text-center bg-transparent outline-none focus:ring-2 focus:ring-[var(--ring-color)] rounded-lg transition-all p-1 -m-1"
              [value]="bloodOxygen()"
              (change)="onValueChange($event, bloodOxygen, 80, 100)"
              min="80" max="100"
          >
          <button (click)="adjustVital(bloodOxygen, 1, 80, 100, $event)" [attr.aria-label]="'Increase Blood Oxygen'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">+</button>
        </div>
      </div>

      <!-- Data Point: Glucose -->
      <div class="bg-[var(--text-accent)]/10 p-4 rounded-xl border border-[var(--text-accent)]/20 flex flex-col justify-between">
        <label [for]="glucoseId" class="text-sm text-[var(--text-color-muted)] mb-2 text-center">Glucose (mg/dL)</label>
        <div class="flex items-center justify-center gap-1">
          <button (click)="adjustVital(glucose, -5, 50, 400, $event)" [attr.aria-label]="'Decrease Glucose'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">-</button>
          <input type="number" 
              [id]="glucoseId"
              class="w-20 text-3xl font-semibold text-[var(--text-color)] tabular-nums text-center bg-transparent outline-none focus:ring-2 focus:ring-[var(--text-accent)] rounded-lg transition-all p-1 -m-1"
              [value]="glucose()"
              (change)="onValueChange($event, glucose, 50, 400)"
              min="50" max="400"
              step="5"
          >
          <button (click)="adjustVital(glucose, 5, 50, 400, $event)" [attr.aria-label]="'Increase Glucose'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">+</button>
        </div>
      </div>

      <!-- Data Point: Activity -->
      <div class="bg-[var(--text-highlight)]/10 p-4 rounded-xl border border-[var(--text-highlight)]/20 flex flex-col justify-between">
        <label [for]="activityId" class="text-sm text-[var(--text-color-muted)] mb-2 text-center">Activity (Steps)</label>
        <div class="flex items-center justify-center gap-1">
          <button (click)="adjustVital(activity, -100, 0, 30000, $event)" [attr.aria-label]="'Decrease Activity'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">-</button>
          <input type="number" 
              [id]="activityId"
              class="w-24 text-3xl font-semibold text-[var(--text-color)] tabular-nums text-center bg-transparent outline-none focus:ring-2 focus:ring-[var(--text-highlight)] rounded-lg transition-all p-1 -m-1"
              [value]="activity()"
              (change)="onValueChange($event, activity, 0, 30000)"
              min="0" max="30000"
              step="100"
          >
          <button (click)="adjustVital(activity, 100, 0, 30000, $event)" [attr.aria-label]="'Increase Activity'" class="w-12 h-12 flex items-center justify-center rounded-full bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)] text-xl">+</button>
        </div>
      </div>
    </div>

    <div class="mt-6 flex flex-wrap items-center justify-center gap-4">
        <button (click)="useAsContext()" class="bg-[var(--button-bg-hover)] hover:bg-[var(--button-bg-hover)]/80 text-[var(--text-accent)] font-medium text-sm py-2 px-5 min-h-[48px] rounded-lg border border-[var(--border-color)] transition-all focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)]">
            Apply Snapshot as Context
        </button>
        <button (click)="toggleTrends()" class="bg-[var(--button-bg)] hover:bg-[var(--button-bg-hover)] text-[var(--text-color-muted)] font-medium text-sm py-2 px-5 min-h-[48px] rounded-lg border border-[var(--border-color)] transition-all focus:outline-none focus:ring-2 focus:ring-[var(--ring-color)]">
            {{ showTrends() ? 'Hide' : 'Show' }} Trends
        </button>
    </div>
  </div>

  @if(showTrends()) {
    <div class="mt-6 relative z-10 animate-pop">
        <app-vitals-trend-graph></app-vitals-trend-graph>
    </div>
  }
</div>
