name: CI

on:
  push:
    branches: [ main, 'copilot-fix-**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Run linter
      run: npm run lint

    - name: Run build
      run: npm run build

    - name: Run unit tests
      run: npm run test
